<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, interactive-widget=resizes-content" />
    <meta name="theme-color" content="#F5F2EE" media="(prefers-color-scheme: light)" />
    <meta name="theme-color" content="#1C1C1E" media="(prefers-color-scheme: dark)" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="application-name" content="Telos" />
    <script>
      (function() {
        var t = localStorage.getItem('theme');
        var dark = t === 'dark' || (t !== 'light' && window.matchMedia('(prefers-color-scheme: dark)').matches);
        document.documentElement.setAttribute('data-theme', dark ? 'dark' : 'light');
      })();
    </script>
    <title>Telos</title>
    <link rel="manifest" href="%%BASE_PATH%%manifest.json" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Onest:wght@100..900&display=swap" />
    <link rel="stylesheet" href="_lib/core/styles/tokens.css" />
    <style>
      @keyframes menu-in {
        from { transform: translateY(100%); opacity: 0; }
        to   { transform: translateY(0);    opacity: 1; }
      }

      @keyframes fade-in {
        from { opacity: 0; }
        to   { opacity: 1; }
      }

      :root {
        --color-accent:        #5BADE0;
        --color-accent-light:  #E2F3FB;
        --color-accent-dark:   #3A93CC;
        --color-accent-subtle: rgba(91, 173, 224, 0.12);
        /* Fixed aliases — never changed by year-header accent picker */
        --color-app-accent:       #5BADE0;
        --color-app-accent-light: #E2F3FB;
        --color-text-on-accent:   #1C1C1E;
        --bottom-nav-height:   80px;
        --pill-inset:          3px;
      }
      *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
      body {
        background-color: var(--color-bg);
        background-image: radial-gradient(ellipse 80% 40% at 50% 0%, rgba(91,173,224,0.08) 0%, transparent 70%);
        color: var(--color-text-primary);
        font-family: var(--font-family);
        font-size: var(--font-size-body);
        line-height: var(--line-height-normal);
        min-block-size: 100dvh;
      }
      body::before {
        content: '';
        position: fixed;
        inset: 0;
        pointer-events: none;
        opacity: 0.04;
        background-image: url("data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' width='200' height='200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/><feColorMatrix type='saturate' values='0'/></filter><rect width='200' height='200' filter='url(%23n)'/></svg>");
        z-index: -1;
      }
    </style>
  </head>
  <body>
    <update-banner hidden></update-banner>
    <app-router></app-router>
    <bottom-nav></bottom-nav>
    <script type="module" src="%%MAIN_JS%%"></script>
  </body>
</html>
